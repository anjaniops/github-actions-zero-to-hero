name: Matrix Build

on:
  push:

jobs:
  matrix-test:
    strategy:
      fail-fast: false

      matrix:
        os:
          - ubuntu-latest
          - windows-latest

        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

        exclude:
          - os: windows-latest
            python-version: "3.10"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Display Version
        run: python --version

      - name: Display Runner
        run: echo "Runner: $RUNNER_OS"

      - name: Matrix Information
        run: echo "Python ${{ matrix.python-version }} on ${{ matrix.os }}"
