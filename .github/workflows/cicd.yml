# this is name of the workflow that will be displayed in the Actions Tab
name: CICD

# Manual click (deliver) workflow whenever user needs
on:
 workflow_dispatch:
   inputs:
     environment: 
       description: This is the environment value where this workflow runs
       default: 'dev'
       required: true
       type: choice
       options:
         - dev
         - prod
         - staging 

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "Code Clone from GitHub"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build Docker Container
        run: echo "Testing Container build"
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test The Container
        run: echo "Testing the Container"
  deploy:
    needs: [build,test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Docker Compose deplyed the app"
    
    
